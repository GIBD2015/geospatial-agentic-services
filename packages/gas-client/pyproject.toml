[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gas-client"
version = "0.1.1"
description = "Python SDK for Geospatial Agentic Services (GAS)."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "Geoinformation and Big Data Research Lab (GIBD)" }
]
keywords = [
  "geospatial",
  "agentic services",
  "GAS",
  "SDK",
  "OGC",
  "geospatial AI"
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering :: GIS",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "requests>=2.31,<3.0",
]

[project.urls]
Homepage = "https://github.com/GIBD2015/geospatial-agentic-services"
Documentation = "https://github.com/GIBD2015/geospatial-agentic-services/tree/main/packages/gas-client"
Source = "https://github.com/GIBD2015/geospatial-agentic-services"

[tool.setuptools]
packages = ["gas_client"]
