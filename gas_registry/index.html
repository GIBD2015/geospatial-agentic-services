<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Store</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #007aff;
            --primary-action: #256b7f;
            --primary-action-hover: #1f5a6b;
            --btn-bg: #f0f0f5;
            --btn-hover: #e4e4eb;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        header {
            position: relative;
            text-align: center;
            padding: 60px 20px 40px;
        }
        .project-link {
            position: absolute;
            top: 20px;
            right: 24px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #f0f6fc;
            background: #24292f;
            border: 1px solid #57606a;
            border-radius: 999px;
            padding: 9px 14px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(36,41,47,0.18);
        }
        .project-link:hover {
            transform: translateY(-1px);
            background: #32383f;
            box-shadow: 0 10px 24px rgba(36,41,47,0.26);
        }
        .project-link svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
            flex: 0 0 auto;
        }

        h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin: 0;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-secondary);
            margin: 8px 0 0 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .container.list-view {
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            height: 360px;
            min-height: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.08);
        }
        .container.list-view .card {
            height: auto;
            min-height: 0;
            border-radius: 18px;
            padding: 18px 22px;
            gap: 10px;
        }
        .container.list-view .card:hover {
            transform: translateY(-2px);
        }
        .container.list-view .card-header {
            align-items: flex-start;
        }
        .container.list-view .icon {
            width: 46px;
            height: 46px;
            border-radius: 13px;
            font-size: 24px;
        }
        .container.list-view .title {
            font-size: 18px;
        }
        .container.list-view .divider {
            margin: 2px 0;
        }
        .container.list-view .description {
            flex: 0 1 auto;
            max-height: 3.1em;
            overflow: hidden;
        }
        .container.list-view .citation {
            margin-top: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon {
            width: 68px;
            height: 68px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            color: white;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
        }

        .icon-vector { background: linear-gradient(135deg, #FF9500, #FF5E3A); }
        .icon-raster { background: linear-gradient(135deg, #34C759, #28A745); }
        .icon-pasda { background: linear-gradient(135deg, #007AFF, #0056B3); }
        .icon-mapping { background: linear-gradient(135deg, #AF52DE, #8944AB); }
        .icon-projection { background: linear-gradient(135deg, #FF2D55, #D92045); }
        .icon-retriever { background: linear-gradient(135deg, #5AC8FA, #3DA2C8); }
        .icon-inspection { background: linear-gradient(135deg, #30D5C8, #0E9594); }
        .icon-webmap { background: linear-gradient(135deg, #FFCC00, #FF9F0A); }
        .icon-stats { background: linear-gradient(135deg, #BF5AF2, #6A5ACD); }

        .title-group {
            flex: 1;
        }

        .title {
            font-size: 19px;
            font-weight: 600;
            margin: 0;
            line-height: 1.2;
        }

        .version {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 4px 0 0 0;
            font-weight: 500;
        }
        .server-url {
            font-size: 12px;
            color: #5f6368;
            margin: 4px 0 0 0;
            line-height: 1.25;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .get-btn {
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border: none;
            border-radius: 16px;
            padding: 6px 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .get-btn:hover {
            background-color: var(--btn-hover);
        }

        .description {
            font-size: 15px;
            line-height: 1.45;
            color: #515154;
            margin: 0;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            overflow-wrap: anywhere;
            word-break: break-word;
            padding-right: 6px;
            scrollbar-width: thin;
            scrollbar-color: #c7c7cc transparent;
        }
        .description::-webkit-scrollbar { width: 6px; }
        .description::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 3px; }
        .description::-webkit-scrollbar-track { background: transparent; }

        .divider {
            height: 1px;
            background-color: #e5e5ea;
            margin: 4px 0;
        }

        .citation {
            font-size: 11px;
            color: #a1a1a6;
            margin-top: auto;
            word-break: break-all;
        }

        .citation a,
        .citation button {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            border: none;
            background: transparent;
            padding: 0;
            font: inherit;
            cursor: pointer;
        }

        .citation a:hover,
        .citation button:hover {
            text-decoration: underline;
        }

        .api-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .api-link {
            display: inline-block;
            text-decoration: none;
            background-color: var(--btn-bg);
            color: var(--accent-color);
            border-radius: 12px;
            padding: 6px 10px;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .api-link:hover {
            background-color: var(--btn-hover);
        }

        .title.clickable { cursor: pointer; transition: color 0.2s ease; }
        .title.clickable:hover { color: var(--accent-color); }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
            z-index: 1000;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            max-width: 720px; width: 100%;
            max-height: 85vh; overflow-y: auto;
            padding: 32px 36px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            -webkit-overflow-scrolling: touch;
        }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: var(--btn-bg); border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 18px; line-height: 1; cursor: pointer;
            color: var(--text-primary);
        }
        .modal-close:hover { background: var(--btn-hover); }
        .modal-title { font-size: 26px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
        .modal-meta { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; }
        .modal-description { font-size: 16px; line-height: 1.55; color: #333; margin: 0; overflow-wrap: anywhere; word-break: break-word; }
        .modal-section { margin-top: 24px; }
        .modal-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); margin: 0 0 10px; font-weight: 600; }
        .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .modal-tag { background: var(--btn-bg); color: #1d1d1f; border-radius: 8px; padding: 4px 10px; font-size: 13px; font-weight: 500; }
        .modal-skill { padding: 12px 0; border-top: 1px solid #e5e5ea; }
        .modal-skill:first-child { border-top: none; padding-top: 0; }
        .modal-skill-name { font-weight: 600; margin: 0 0 4px; font-size: 15px; }
        .modal-skill-desc { font-size: 14px; color: #515154; margin: 0; line-height: 1.45; }
        .modal-link { display: inline-block; margin-top: 4px; color: var(--accent-color); font-weight: 600; font-size: 13px; text-decoration: none; }
        .modal-link:hover { text-decoration: underline; }
        /* Capability badges (provenance / reproducibility / validation) */
        .modal-badges { display: flex; flex-wrap: wrap; gap: 8px; }
        .modal-badge {
            display: inline-flex; align-items: center; gap: 6px;
            border-radius: 999px; padding: 5px 12px;
            font-size: 13px; font-weight: 600;
            border: 1px solid transparent;
            cursor: help;
        }
        .modal-badge.yes { background: #e8f7ec; color: #1f7a3a; border-color: #c9ebd2; }
        .modal-badge.no  { background: #fdecec; color: #b3261e; border-color: #f4caca; }
        .modal-badge .modal-badge-mark { font-size: 14px; line-height: 1; }
        /* Skill constraint sub-rows */
        .modal-skill-meta { margin: 6px 0 0; font-size: 13px; color: #515154; line-height: 1.45; }
        .modal-skill-meta span { font-weight: 600; color: #1d1d1f; }
        .modal-skill-other { margin: 4px 0 0 16px; padding: 0; font-size: 13px; color: #515154; }
        /* Operation / ExecuteTask summary */
        .modal-op-name { font-weight: 600; font-size: 15px; margin: 0 0 4px; }
        .modal-op-desc { font-size: 14px; color: #515154; margin: 0 0 8px; line-height: 1.45; }
        .modal-op-row { font-size: 13px; color: #515154; margin: 4px 0; line-height: 1.45; overflow-wrap: anywhere; }
        .modal-op-row span { font-weight: 600; color: #1d1d1f; }
        .modal-op-row code { background: var(--btn-bg); padding: 1px 6px; border-radius: 6px; font-size: 12px; }
        .modal-facts {
            display: grid;
            grid-template-columns: minmax(130px, max-content) minmax(0, 1fr);
            gap: 4px 14px;
            font-size: 13px;
            line-height: 1.28;
            align-items: start;
        }
        .modal-facts dt {
            color: #1d1d1f;
            font-weight: 600;
        }
        .modal-facts dd {
            color: #515154;
            margin: 0;
            overflow-wrap: anywhere;
            word-break: break-word;
        }
        .modal-facts code {
            background: var(--btn-bg);
            border-radius: 6px;
            padding: 1px 6px;
            font-size: 12px;
        }
        .modal-facts .modal-link {
            margin-top: 0;
            line-height: 1.28;
        }
        /* Footer meta (agent_id / base_url / default_model) */
        .modal-footer-meta {
            margin-top: 24px; padding-top: 16px;
            border-top: 1px solid #e5e5ea;
            font-size: 12px; color: var(--text-secondary);
            display: grid; grid-template-columns: max-content 1fr;
            row-gap: 6px; column-gap: 12px;
            overflow-wrap: anywhere; word-break: break-word;
        }
        .modal-footer-meta dt { font-weight: 600; color: #1d1d1f; }
        .modal-footer-meta dd { margin: 0; }
        .modal-footer-meta a { color: var(--accent-color); text-decoration: none; }
        .modal-footer-meta a:hover { text-decoration: underline; }

        /* Action bar (search + register) */
        .action-bar {
            max-width: 1200px;
            margin: 0 auto 24px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1 1 240px;
            max-width: 420px;
            padding: 10px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            font-size: 15px;
            background: #fff;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
        }
        .primary-btn {
            background: var(--primary-action);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(37,107,127,0.16);
            transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
        }
        .primary-btn:hover {
            background: var(--primary-action-hover);
            box-shadow: 0 10px 22px rgba(31,90,107,0.22);
        }
        .primary-btn:active { transform: translateY(1px); }
        .primary-btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .view-toggle {
            display: inline-flex;
            align-items: center;
            padding: 3px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            background: #fff;
            gap: 2px;
        }
        .view-toggle button {
            border: none;
            border-radius: 11px;
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .view-toggle button.active {
            background: rgba(0,122,255,0.1);
            color: var(--accent-color);
        }
        .pagination-bar {
            max-width: 1200px;
            margin: -36px auto 48px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .pagination-bar label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .pagination-bar select {
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            background: #fff;
            color: var(--text-primary);
            padding: 7px 10px;
            font-size: 14px;
        }
        .page-btn {
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            background: #fff;
            color: var(--text-primary);
            padding: 7px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .page-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        .page-btn:disabled {
            opacity: 0.45;
            cursor: default;
        }

        /* Filter bar (query-param checkboxes) */
        .filter-bar {
            max-width: 1200px;
            margin: 0 auto 24px;
            padding: 0 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .filter-bar .filter-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-right: 2px;
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border: 1px solid #d2d2d7;
            border-radius: 999px;
            background: #fff;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }
        .filter-chip:hover { border-color: var(--accent-color); }
        .filter-chip input { accent-color: var(--accent-color); margin: 0; cursor: pointer; }
        .filter-chip.active {
            border-color: var(--accent-color);
            background: rgba(0,122,255,0.08);
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Search group: input + "search by" select + filter dropdown */
        .search-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1 1 420px;
            max-width: 660px;
        }
        .search-group .search-input { flex: 1 1 auto; max-width: none; }

        /* Unified search box: [search-by ▾] | input  (one pill) */
        .search-box {
            display: flex;
            align-items: stretch;
            flex: 1 1 auto;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            background: #fff;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
        }
        .search-box .field-menu,
        .search-box .filter-menu-right { display: flex; }
        .search-box .field-btn,
        .search-box .filter-btn-right {
            border: none;
            background: transparent;
            color: var(--text-secondary);
        }
        .search-box .field-btn {
            border-right: 1px solid #e5e5ea;
            border-radius: 14px 0 0 14px;
        }
        .search-box .filter-btn-right {
            border-left: 1px solid #e5e5ea;
            border-radius: 0 14px 14px 0;
        }
        .search-box .field-btn:hover,
        .search-box .filter-btn-right:hover { background: var(--btn-bg); }
        .search-box .field-btn.active,
        .search-box .filter-btn-right.active {
            background: rgba(0,122,255,0.08);
            color: var(--accent-color);
        }
        .search-box .search-input {
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        .search-box .search-input:focus { border: none; box-shadow: none; }
        /* Each dropdown anchors to its own button. */
        #field-panel { left: 0; right: auto; }
        #filter-panel { right: 0; left: auto; }

        .filter-menu { position: relative; }
        .filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 12px;
            border: 1px solid #d2d2d7;
            border-radius: 14px;
            background: #fff;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.15s ease, background-color 0.15s ease;
        }
        .filter-btn:hover { border-color: var(--accent-color); }
        .filter-btn.active { border-color: var(--accent-color); background: rgba(0,122,255,0.08); color: var(--accent-color); }
        .filter-btn .chev { transition: transform 0.15s ease; font-size: 11px; }
        .filter-btn[aria-expanded="true"] .chev { transform: rotate(180deg); }
        .filter-badge {
            display: inline-block;
            min-width: 16px;
            padding: 0 5px;
            border-radius: 999px;
            background: var(--accent-color);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            text-align: center;
            line-height: 16px;
        }
        .filter-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            z-index: 50;
            min-width: 230px;
            background: #fff;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12);
            padding: 12px;
        }
        .filter-panel[hidden] { display: none; }
        .filter-panel-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);
            margin: 2px 0 10px;
        }
        .filter-opt {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 4px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
        }
        .filter-opt input { accent-color: var(--accent-color); cursor: pointer; }
        .filter-clear {
            margin-top: 8px;
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 10px;
            background: var(--btn-bg);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .filter-clear:hover { background: var(--btn-hover); }
        .filter-clear:disabled { opacity: 0.5; cursor: default; }

        /* "Search by" options inside the dropdown */
        .field-opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            margin: 1px 0;
            border: none;
            border-radius: 8px;
            background: none;
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
        }
        .field-opt:hover { background: var(--btn-bg); }
        .field-opt.active { color: var(--accent-color); font-weight: 600; }
        .field-opt.active::after { content: "✓"; font-weight: 700; margin-left: 10px; }

        /* Registration modal form */
        .form-row { margin: 0 0 14px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin: 0 0 6px; }
        .form-input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 14px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
        .form-hint { font-size: 12px; color: var(--text-secondary); margin: 4px 0 0; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .secondary-btn {
            background: var(--btn-bg); color: var(--text-primary);
            border: none; border-radius: 12px;
            padding: 10px 18px; font-size: 15px; font-weight: 600;
            cursor: pointer;
        }

    <script>
        (function routeGasRequest() {
            var currentJsonFilename = "gas-response.json";

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            var jsonNodeCounter = 0;

            function getIndent(depth) {
                return new Array(depth + 1).join("  ");
            }

            function formatKey(key) {
                return typeof key === "string" ? "<span class=\"json-key\">\"" + escapeHtml(key) + "\"</span>: " : "";
            }

            function formatPrimitive(value) {
                if (value === null) {
                    return "<span class=\"json-type-null\">null</span>";
                }
                if (typeof value === "string") {
                    return "<span class=\"json-type-string\">\"" + escapeHtml(value) + "\"</span>";
                }
                if (typeof value === "number") {
                    return "<span class=\"json-type-number\">" + String(value) + "</span>";
                }
                if (typeof value === "boolean") {
                    return "<span class=\"json-type-boolean\">" + String(value) + "</span>";
                }
                return "<span class=\"json-type-undefined\">undefined</span>";
            }

            function renderJsonNode(value, key, depth, isLast, isRoot) {
                var container = document.createElement("div");
                var keyPrefix = formatKey(key);
                var comma = isLast ? "" : ",";
                var indent = getIndent(depth);

                if (value === null || typeof value !== "object") {
                    var primitiveLine = document.createElement("div");
                    primitiveLine.className = "json-line";
                    primitiveLine.innerHTML =
                        escapeHtml(indent) +
                        "<span class=\"json-toggle-slot\"></span>" +
                        keyPrefix +
                        formatPrimitive(value) +
                        comma;
                    container.appendChild(primitiveLine);
                    return container;
                }

                var isArray = Array.isArray(value);
                var keys = isArray ? value.map(function(_, i) { return i; }) : Object.keys(value);
                var openChar = isArray ? "[" : "{";
                var closeChar = isArray ? "]" : "}";

                if (keys.length === 0) {
                    var emptyLine = document.createElement("div");
                    emptyLine.className = "json-line";
                    emptyLine.innerHTML =
                        escapeHtml(indent) +
                        "<span class=\"json-toggle-slot\"></span>" +
                        keyPrefix +
                        openChar +
                        closeChar +
                        comma;
                    container.appendChild(emptyLine);
                    return container;
                }

                var nodeId = "json-node-" + (jsonNodeCounter++);
                var headerLine = document.createElement("div");
                headerLine.className = "json-line";
                headerLine.innerHTML =
                    escapeHtml(indent) +
                    "<span class=\"json-toggle-slot\"><button type=\"button\" class=\"json-toggle\" data-target=\"" + nodeId + "\" aria-expanded=\"true\">▼</button></span>" +
                    keyPrefix +
                    openChar;
                container.appendChild(headerLine);

                var children = document.createElement("div");
                children.id = nodeId;
                children.className = "json-children";
                keys.forEach(function(childKey, index) {
                    children.appendChild(
                        renderJsonNode(value[childKey], isArray ? null : String(childKey), depth + 1, index === keys.length - 1, false)
                    );
                });
                container.appendChild(children);

                var closingLine = document.createElement("div");
                closingLine.className = "json-line";
                closingLine.innerHTML = escapeHtml(indent) + "<span class=\"json-toggle-slot\"></span>" + closeChar + comma;
                container.appendChild(closingLine);

                if (isRoot) {
                    container.classList.add("json-root");
                }

                return container;
            }

            function renderJson(payload) {
                document.title = "GAS API Response";
                document.documentElement.innerHTML =
                    "<head><meta charset=\"UTF-8\"><title>GAS API Response</title></head>" +
                    "<body>" +
                    "<div class=\"json-page\">" +
                    "<div class=\"json-toolbar\">" +
                    "<button id=\"download-json\" type=\"button\">Download JSON</button>" +
                    "</div>" +
                    "<div id=\"json-viewer\" class=\"json-viewer\"></div>" +
                    "</div>" +
                    "</body>";

                var style = document.createElement("style");
                style.textContent = [
                    "body{margin:0;padding:16px;background:#ffffff;color:#111111;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}",
                    ".json-page{max-width:1200px;margin:0 auto;}",
                    ".json-toolbar{display:flex;justify-content:flex-end;margin-bottom:12px;}",
                    "#download-json{border:1px solid #d2d2d7;background:#f5f5f7;color:#1d1d1f;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;}",
                    "#download-json:hover{background:#ebebf0;}",
                    ".json-viewer{border:1px solid #e5e5ea;border-radius:10px;padding:12px;line-height:1.5;}",
                    ".json-line{padding:1px 0;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;}",
                    ".json-children{margin:0;}",
                    ".json-toggle-slot{display:inline-block;width:14px;text-align:left;}",
                    ".json-toggle{border:none;background:transparent;color:#007aff;cursor:pointer;padding:0;font-size:11px;line-height:1;vertical-align:middle;width:14px;text-align:left;}",
                    ".json-key{color:#1d1d1f;}",
                    ".json-meta{color:#007aff;}",
                    ".json-type-string{color:#0a7f42;}",
                    ".json-type-number{color:#b25000;}",
                    ".json-type-boolean{color:#7b2cbf;}",
                    ".json-type-null{color:#8e8e93;}",
                    ".json-type-undefined{color:#8e8e93;}"
                ].join("");
                document.head.appendChild(style);

                var viewer = document.getElementById("json-viewer");
                viewer.appendChild(renderJsonNode(payload, null, 0, true, true));

                viewer.addEventListener("click", function(event) {
                    var toggle = event.target;
                    if (!toggle.classList.contains("json-toggle")) {
                        return;
                    }
                    var targetId = toggle.getAttribute("data-target");
                    var target = document.getElementById(targetId);
                    if (!target) {
                        return;
                    }
                    var isHidden = target.style.display === "none";
                    target.style.display = isHidden ? "block" : "none";
                    toggle.textContent = isHidden ? "▼" : "▶";
                    toggle.setAttribute("aria-expanded", isHidden ? "true" : "false");
                });

                document.getElementById("download-json").addEventListener("click", function() {
                    var jsonText = JSON.stringify(payload, null, 2);
                    var blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
                    var url = URL.createObjectURL(blob);
                    var link = document.createElement("a");
                    link.href = url;
                    link.download = currentJsonFilename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(url);
                });
            }

            function renderErrorJson(errorMessage, details) {
                var payload = {
                    ok: false,
                    error: errorMessage
                };

                if (details) {
                    payload.details = details;
                }

                renderJson(payload);
            }

            function respondWithJsonFile(filePath) {
                var matchedName = String(filePath || "").match(/[^\\/]+$/);
                currentJsonFilename = matchedName ? matchedName[0] : "gas-response.json";
                fetch(filePath, { cache: "no-store" })
                    .then(function(response) {
                        if (!response.ok) {
                            throw new Error("HTTP " + response.status);
                        }
                        return response.json();
                    })
                    .then(function(data) {
                        renderJson(data);
                    })
                    .catch(function(err) {
                        renderErrorJson("Requested JSON resource is unavailable.", String(err && err.message ? err.message : err));
                    });
            }

            var params = new URLSearchParams(window.location.search);
            var request = (params.get("REQUEST") || "").toLowerCase();
            var agent = (params.get("name") || params.get("agent") || "").toLowerCase();
            var service = (params.get("SERVICE") || "").toUpperCase();

            // Keep normal page rendering when URL is not API-style.
            if (!request) {
                return;
            }

            if (service && service !== "GAS") {
                renderErrorJson("Invalid SERVICE parameter.", "Expected SERVICE=GAS.");
                return;
            }

            if (request === "getcapabilities") {
                respondWithJsonFile("ServiceCapabilities/gas_capabilities.json");
                return;
            }

            if (request === "describeagent" && agent) {
                respondWithJsonFile("ServiceCapabilities/" + agent + ".json");
                return;
            }

            if (request === "describeagent" && !agent) {
                renderErrorJson("Missing required agent parameter.", "Provide ?agent=<agent_name> for DescribeAgent.");
                return;
            }

            renderErrorJson("Invalid REQUEST parameter.", "Supported values: GetCapabilities, DescribeAgent.");
        })();
    </script>
</head>
