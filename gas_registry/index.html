    <script>
        (function loadAgentCards() {
            // Skip if the page is rendering an API JSON response.
            var params = new URLSearchParams(window.location.search);
            if (params.get("REQUEST")) {
                return;
            }

            // ---- API endpoint configuration --------------------------------
            // The Flask backend (app.py) can live on a different origin than
            // this page — e.g. page on GitHub Pages, API on PythonAnywhere.
            // Leave "" for same-origin (local `python app.py` keeps working).
            // Override WITHOUT editing the file via:
            //   • ?api=https://yourname.pythonanywhere.com  in the page URL
            //   • window.GAS_API_BASE set before this script runs
            // Or just set DEFAULT_API_BASE below once the server URL is known.
            var DEFAULT_API_BASE = "";  // e.g. "https://yourname.pythonanywhere.com"
            var API_BASE = (function () {
                var qp = new URLSearchParams(window.location.search).get("api");
                return String(qp || window.GAS_API_BASE || DEFAULT_API_BASE || "")
                    .replace(/\/+$/, "");
            }());
            // Turn a relative "/api/..." path (or a relative describeUrl from
            // the API) into an absolute URL against API_BASE. Absolute URLs
            // and the same-origin default are returned unchanged.
            function apiUrl(pathOrUrl) {
                var s = String(pathOrUrl == null ? "" : pathOrUrl);
                if (/^https?:\/\//i.test(s)) return s;
                if (!API_BASE) return s;
                return API_BASE + (s.charAt(0) === "/" ? s : "/" + s);
            }

            var CAPABILITIES_URL = apiUrl("/registry/api/gas?SERVICE=GAS&VERSION=1.0.0&REQUEST=GetCapabilities");

            // Presentation-only mapping for icon styles + emoji, keyed by agent slug.
            // New agents fall back to a default style.
            var ICON_MAP = {
                vector_analysis_agent: { cls: "icon-vector",     emoji: "📐" }, // 📐
                raster_agent:          { cls: "icon-raster",     emoji: "🏔️" }, // 🏔️
                pasda_agent:           { cls: "icon-pasda",      emoji: "🔍" }, // 🔍
                mapping_agent:         { cls: "icon-mapping",    emoji: "📍" }, // 📍
                map_projection_agent:  { cls: "icon-projection", emoji: "🌐" }, // 🌐
                geospatial_data_retrieval_agent:  { cls: "icon-retriever",  emoji: "📥" }, // 📥
                geospatial_data_inspection_agent: { cls: "icon-inspection", emoji: "🔎" }, // 🔎
                web_mapping_app_agent:            { cls: "icon-webmap",     emoji: "🗺️" }, // 🗺️
                spatial_statistics_agent:         { cls: "icon-stats",      emoji: "📊" }  // 📊
            };
            var DEFAULT_ICON = { cls: "icon-vector", emoji: "✨" };

            function escapeHtml(value) {
                return String(value == null ? "" : value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            //  Convert e.g "vector_analysis_agent" -> "VectorAnalysisAgent"
            function toDisplayTitle(slug) {
                return String(slug || "")
                    .split("_")
                    .filter(Boolean)
                    .map(function(p) { return p.charAt(0).toUpperCase() + p.slice(1); })
                    .join("");
            }

            function fetchJson(url) {
                return fetch(url, { cache: "no-store" }).then(function(r) {
                    if (!r.ok) { throw new Error("HTTP " + r.status + " for " + url); }
                    return r.json();
                });
            }

            // ---- Modal (one shared instance) ----
            var modalOverlay = document.createElement("div");
            modalOverlay.className = "modal-overlay";
            var modalContent = document.createElement("div");
            modalContent.className = "modal-content";
            modalOverlay.appendChild(modalContent);
            document.body.appendChild(modalOverlay);

            function closeModal() {
                modalOverlay.classList.remove("open");
                document.body.style.overflow = "";
            }
            modalOverlay.addEventListener("click", function(e) {
                if (e.target === modalOverlay) closeModal();
            });
            document.addEventListener("keydown", function(e) {
                if (e.key === "Escape") closeModal();
            });

            function tagsHtml(values) {
                return values.map(function(t) {
                    return '<span class="modal-tag">' + escapeHtml(t) + '</span>';
                }).join("");
            }

            // Loosely truthy: handles "true"/"false" strings and real booleans.
            function isYes(v) {
                if (v === true) return true;
                if (typeof v === "string") return v.toLowerCase() === "true";
                return false;
            }

            function capabilityBadgesHtml(pr) {
                if (!pr || typeof pr !== "object") return "";
                var items = [
                    { key: "provenance",      label: "Provenance" },
                    { key: "reproducibility", label: "Reproducibility" },
                    { key: "validation",      label: "Validation" }
                ];
                var any = items.some(function(it) { return pr[it.key]; });
                if (!any) return "";
                var badges = items.map(function(it) {
                    var info = pr[it.key];
                    if (!info) return "";
                    var yes = isYes(info.supported);
                    var tip = info.description || (yes ? "Supported" : "Not supported");
                    return '<span class="modal-badge ' + (yes ? "yes" : "no") + '" title="' + escapeHtml(tip) + '">' +
                        '<span class="modal-badge-mark">' + (yes ? "&#10003;" : "&#10005;") + '</span>' +
                        escapeHtml(it.label) +
                        '</span>';
                }).join("");
                return '<div class="modal-section"><h4>Capabilities</h4>' +
                    '<div class="modal-badges">' + badges + '</div></div>';
            }

            function skillConstraintsHtml(c) {
                if (!c || typeof c !== "object") return "";
                var html = "";
                if (c.spatial)  html += '<p class="modal-skill-meta"><span>Spatial:</span> '  + escapeHtml(c.spatial)  + '</p>';
                if (c.temporal) html += '<p class="modal-skill-meta"><span>Temporal:</span> ' + escapeHtml(c.temporal) + '</p>';
                if (Array.isArray(c.other) && c.other.length) {
                    html += '<p class="modal-skill-meta"><span>Other:</span></p><ul class="modal-skill-other">';
                    c.other.forEach(function(line) {
                        html += '<li>' + escapeHtml(line) + '</li>';
                    });
                    html += '</ul>';
                }
                return html;
            }

            function valueListHtml(value) {
                if (Array.isArray(value)) {
                    return value.length ? value.map(function(v) {
                        return '<code>' + escapeHtml(displayValue(v)) + '</code>';
                    }).join(" ") : "";
                }
                if (value && typeof value === "object") {
                    return escapeHtml(displayValue(value));
                }
                return value === undefined || value === null || value === "" ? "" : escapeHtml(displayValue(value));
            }

            function displayValue(value) {
                if (value === true) return "Yes";
                if (value === false) return "No";
                if (value === undefined || value === null) return "";
                if (Array.isArray(value)) return value.map(displayValue).filter(Boolean).join(", ");
                if (value && typeof value === "object") {
                    if (value.description) return value.description;
                    if (value.supported !== undefined && value.description) return (isYes(value.supported) ? "Supported. " : "Not supported. ") + value.description;
                    if (value.supported !== undefined) return isYes(value.supported) ? "Supported" : "Not supported";
                    return JSON.stringify(value);
                }
                return String(value);
            }

            function factsHtml(title, rows) {
                var filtered = rows.filter(function(row) {
                    return row && row[1] !== undefined && row[1] !== null && row[1] !== "" &&
                        !(Array.isArray(row[1]) && row[1].length === 0);
                });
                if (!filtered.length) return "";
                var body = filtered.map(function(row) {
                    return '<dt>' + escapeHtml(row[0]) + '</dt><dd>' + valueListHtml(row[1]) + '</dd>';
                }).join("");
                return '<div class="modal-section"><h4>' + escapeHtml(title) + '</h4>' +
                    '<dl class="modal-facts">' + body + '</dl></div>';
            }

            function dataSupportHtml(dataSupport) {
                if (!dataSupport || typeof dataSupport !== "object") return "";
                return factsHtml("Geospatial data support", [
                    ["Data types", dataSupport.supported_data_types],
                    ["Formats", dataSupport.supported_formats],
                    ["CRS", dataSupport.supported_crs || dataSupport.coordinate_reference_systems],
                    ["Geometry types", dataSupport.supported_geometry_types || dataSupport.geometry_types],
                    ["Raster types", dataSupport.supported_raster_types || dataSupport.raster_types],
                    ["Spatial extent", dataSupport.spatial_extent || dataSupport.extent],
                    ["Scale / resolution", dataSupport.scale_or_resolution || dataSupport.resolution],
                    ["Input datasets required", dataSupport.requires_input_datasets]
                ]);
            }

            function governanceHtml(governance) {
                if (!governance || typeof governance !== "object") return "";
                return factsHtml("Governance and use constraints", [
                    ["Access control", governance.access || governance.access_control],
                    ["Operation policy", governance.operation_policy],
                    ["Review policy", governance.review_policy],
                    ["Policy notes", governance.policy_notes],
                    ["License", governance.license || governance.licensing],
                    ["Privacy", governance.privacy],
                    ["Human review", governance.human_review],
                    ["Permitted use", governance.permitted_use || governance.permitted_uses],
                    ["Data retention", governance.data_retention || governance.retention]
                ]);
            }

            function conformanceHtml(conformance) {
                if (!conformance || typeof conformance !== "object") return "";
                return factsHtml("GAS conformance", [
                    ["GAS version", conformance.gas_version],
                    ["Interface profile", conformance.interface_profile || conformance.profile],
                    ["Response schema", conformance.response_schema],
                    ["Request schema", conformance.request_schema],
                    ["Task modes", conformance.task_modes || conformance.modes]
                ]);
            }

            function extensionsHtml(extensions) {
                if (!extensions || typeof extensions !== "object") return "";
                var rows = [["Description", extensions.description]];
                Object.keys(extensions).forEach(function(key) {
                    if (key === "description") return;
                    var value = extensions[key];
                    if (Array.isArray(value)) {
                        rows.push([key.replace(/_/g, " "), value.slice(0, 6).map(function(item) {
                            if (typeof item === "string") return item;
                            return item.name || item.id || item.title || JSON.stringify(item);
                        })]);
                    } else if (value && typeof value === "object") {
                        rows.push([key.replace(/_/g, " "), JSON.stringify(value)]);
                    } else {
                        rows.push([key.replace(/_/g, " "), value]);
                    }
                });
                return factsHtml("Agent-specific extensions", rows);
            }

            function provenanceDetailsHtml(pr) {
                if (!pr || typeof pr !== "object") return "";
                return factsHtml("Provenance and reproducibility details", [
                    ["Provenance", pr.provenance],
                    ["Reproducibility", pr.reproducibility],
                    ["Validation", pr.validation]
                ]);
            }

            function providerHtml(provider, contact) {
                provider = provider || {};
                contact = contact || {};
                if (!provider.name && !provider.website && !contact.name && !contact.email) return "";
                var providerName = provider.website
                    ? '<a class="modal-link" href="' + escapeHtml(provider.website) + '" target="_blank" rel="noopener">' + escapeHtml(provider.name || provider.website) + '</a>'
                    : escapeHtml(provider.name || "");
                var rows = [];
                if (providerName) rows.push(["Provider", providerName]);
                if (contact.name) rows.push(["Contact", escapeHtml(contact.name)]);
                if (contact.email) {
                    rows.push([
                        "Email",
                        escapeHtml(contact.email)
                    ]);
                }
                var body = rows.map(function(row) {
                    return '<dt>' + escapeHtml(row[0]) + '</dt><dd>' + row[1] + '</dd>';
                }).join("");
                return '<div class="modal-section"><h4>Provider</h4>' +
                    '<dl class="modal-facts">' + body + '</dl></div>';
            }

            function executeHtml(executeTask, legacyOps) {
                // New schema: single execute_task object. Legacy: operations[].
                var op = executeTask;
                if (!op && Array.isArray(legacyOps) && legacyOps.length) op = legacyOps[0];
                if (!op || typeof op !== "object") return "";

                var name = op.name || op.operation_id || "Operation";
                var desc = op.description || "";
                var rows = [];

                if (Array.isArray(op.modes) && op.modes.length) {
                    rows.push('<span>Modes:</span> ' + op.modes.map(function(m) {
                        return '<code>' + escapeHtml(m) + '</code>';
                    }).join(" "));
                }

                // Required inputs from new schema's task/inputs blocks.
                var required = [];
                if (op.task && typeof op.task === "object") {
                    Object.keys(op.task).forEach(function(k) {
                        if (op.task[k] && op.task[k].required) required.push(k);
                    });
                }
                if (op.inputs && typeof op.inputs === "object") {
                    Object.keys(op.inputs).forEach(function(k) {
                        if (op.inputs[k] && op.inputs[k].required) required.push(k);
                    });
                }
                if (required.length) {
                    rows.push('<span>Required inputs:</span> ' + required.map(function(r) {
                        return '<code>' + escapeHtml(r) + '</code>';
                    }).join(" "));
                }

                // Output artifacts.
                if (op.outputs && Array.isArray(op.outputs.primary_artifacts)) {
                    var arts = op.outputs.primary_artifacts.map(function(a) {
                        var fmt = Array.isArray(a.formats) ? " (" + a.formats.join("/") + ")" : "";
                        return escapeHtml((a.type || "") + fmt);
                    }).filter(Boolean);
                    if (arts.length) rows.push('<span>Artifacts:</span> ' + arts.join(", "));
                }

                // Credentials (one_of).
                if (op.credentials && Array.isArray(op.credentials.one_of) && op.credentials.one_of.length) {
                    rows.push('<span>Credentials:</span> one of ' + op.credentials.one_of.map(function(c) {
                        return '<code>' + escapeHtml(c) + '</code>';
                    }).join(" or "));
                }

                var html = '<div class="modal-section"><h4>How to invoke</h4>' +
                    '<p class="modal-op-name">' + escapeHtml(name) + '</p>';
                if (desc) html += '<p class="modal-op-desc">' + escapeHtml(desc) + '</p>';
                rows.forEach(function(r) { html += '<p class="modal-op-row">' + r + '</p>'; });
                html += '</div>';
                return html;
            }

            function footerMetaHtml(profile, agentEntry) {
                var items = [];
                var agentId = profile.agent_id || agentEntry.name;
                var sourceServer = agentEntry.source_base_url || agentEntry.sourceBaseUrl || "";
                if (agentId)             items.push(["Agent ID",      '<code>' + escapeHtml(agentId) + '</code>']);
                if (sourceServer)        items.push(["GAS Server",     '<a href="' + escapeHtml(sourceServer) + '" target="_blank" rel="noopener">' + escapeHtml(sourceServer) + '</a>']);
                if (profile.base_url)    items.push(["Base URL",      '<a href="' + escapeHtml(profile.base_url) + '" target="_blank" rel="noopener">' + escapeHtml(profile.base_url) + '</a>']);
                if (profile.default_model) items.push(["Default model", '<code>' + escapeHtml(profile.default_model) + '</code>']);
                if (!items.length) return "";
                var rows = items.map(function(p) {
                    return '<dt>' + escapeHtml(p[0]) + '</dt><dd>' + p[1] + '</dd>';
                }).join("");
                return '<dl class="modal-footer-meta">' + rows + '</dl>';
            }

            function openModal(agentEntry, detail) {
                var profile = (detail && detail.profile) || {};
                var slug = profile.agent_id || agentEntry.name || profile.name || "";
                var title = (profile.name && profile.name !== slug)
                    ? profile.name
                    : toDisplayTitle(slug);
                var version = profile.version || "";
                var status = profile.status || "";
                var lastUpdated = profile.last_updated || "";
                var description = profile.description || "";
                var provider = profile.provider || {};
                // New schema: provider.contacts (array). Legacy: provider.contact (object).
                var contact = (Array.isArray(provider.contacts) && provider.contacts.length)
                    ? (provider.contacts[0] || {})
                    : (provider.contact || {});

                var dataSupport = (detail && detail.data_support) || {};
                var formats = dataSupport.supported_formats || [];
                var dataTypes = dataSupport.supported_data_types || [];
                var governance = (detail && detail.governance) || {};
                var conformance = (detail && detail.conformance) || {};
                var extensions = (detail && detail.extensions) || {};

                var keywords = (detail && detail.keywords) || [];
                var skills = (detail && detail.skills) || [];
                var executeTask = (detail && detail.execute_task) || null;
                var legacyOps = (detail && detail.operations) || [];
                var pr = (detail && detail.provenance_and_reproducibility) || {};

                var metaParts = [];
                if (version) metaParts.push("Version " + escapeHtml(version));
                if (status) metaParts.push(escapeHtml(status));
                if (lastUpdated) metaParts.push("Updated " + escapeHtml(lastUpdated));

                var html =
                    '<button class="modal-close" type="button" aria-label="Close">×</button>' +
                    '<h2 class="modal-title">' + escapeHtml(title) + '</h2>' +
                    (metaParts.length ? '<p class="modal-meta">' + metaParts.join(" · ") + '</p>' : '') +
                    '<p class="modal-description">' + escapeHtml(description) + '</p>';

                html += providerHtml(provider, contact);
                html += footerMetaHtml(profile, agentEntry);

                // Keywords (new top-level field).
                if (keywords.length) {
                    html += '<div class="modal-section"><h4>Keywords</h4>' +
                        '<div class="modal-tags">' + tagsHtml(keywords) + '</div></div>';
                }

                // Capability badges — provenance / reproducibility / validation.
                html += capabilityBadgesHtml(pr);

                html += dataSupportHtml(dataSupport);

                if (skills.length) {
                    html += '<div class="modal-section"><h4>Skills</h4>';
                    skills.forEach(function(s) {
                        html += '<div class="modal-skill">' +
                            '<p class="modal-skill-name">' + escapeHtml(s.name || s.skill_id || s.id || "") + '</p>' +
                            '<p class="modal-skill-desc">' + escapeHtml(s.description || "") + '</p>' +
                            skillConstraintsHtml(s.constraints) +
                            '</div>';
                    });
                    html += '</div>';
                }

                // ExecuteTask (new) or legacy operations[]. Show how to call it.
                html += executeHtml(executeTask, legacyOps);
                html += governanceHtml(governance);
                html += provenanceDetailsHtml(pr);
                html += conformanceHtml(conformance);
                html += extensionsHtml(extensions);

                // Footer meta — agent_id, base_url, default_model.
                if (agentEntry.describeUrl) {
                    html += '<div class="modal-section">' +
                        '<a class="modal-link" href="' + escapeHtml(agentEntry.describeUrl) + '" target="_blank" rel="noopener">View full DescribeAgent JSON →</a>' +
                        '</div>';
                }

                modalContent.innerHTML = html;
                modalContent.querySelector(".modal-close").addEventListener("click", closeModal);
                modalContent.scrollTop = 0;
                modalOverlay.classList.add("open");
                document.body.style.overflow = "hidden";
            }
            // ---- /Modal ----

            function renderCard(agentEntry, detail) {
                var profile = (detail && detail.profile) || {};
                // Slug = stable identifier (snake_case) used for icon lookup.
                // New profiles expose it as agent_id; legacy used profile.name.
                var slug = profile.agent_id || agentEntry.name || profile.name || "";
                var icon = ICON_MAP[slug] || DEFAULT_ICON;
                // Display title: prefer the human-readable profile.name when it
                // differs from the slug; otherwise derive one from the slug.
                var title = (profile.name && profile.name !== slug)
                    ? profile.name
                    : toDisplayTitle(slug);
                var version = (detail && detail.profile && detail.profile.version) || "";
                var description = (detail && detail.profile && detail.profile.description) || "";
                var sourceServer = agentEntry.source_base_url || agentEntry.sourceBaseUrl || "";
                var hasDetail = !!(detail && detail.profile);

                var article = document.createElement("article");
                article.className = "card";
                article.innerHTML =
                    '<div class="card-header">' +
                        '<div class="icon ' + escapeHtml(icon.cls) + '">' + icon.emoji + '</div>' +
                        '<div class="title-group">' +
                            '<h3 class="title' + (hasDetail ? ' clickable' : '') + '" title="' + (hasDetail ? 'Click for full details' : '') + '">' + escapeHtml(title) + '</h3>' +
                            (version ? '<p class="version">Version ' + escapeHtml(version) + '</p>' : '') +
                            (sourceServer ? '<p class="server-url" title="' + escapeHtml(sourceServer) + '">' + escapeHtml(sourceServer) + '</p>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="divider"></div>' +
                    '<p class="description">' + escapeHtml(description) + '</p>' +
                    (hasDetail
                        ? '<p class="citation"><button class="learn-more-btn" type="button">Learn More</button></p>'
                        : '');

                if (hasDetail) {
                    var titleEl = article.querySelector(".title");
                    titleEl.addEventListener("click", function() { openModal(agentEntry, detail); });
                    var learnMoreEl = article.querySelector(".learn-more-btn");
                    if (learnMoreEl) {
                        learnMoreEl.addEventListener("click", function() { openModal(agentEntry, detail); });
                    }
                }
                return article;
            }

            function renderErrorCard(agentEntry, err) {
                var slug = agentEntry.name || "";
                var sourceServer = agentEntry.source_base_url || agentEntry.sourceBaseUrl || "";
                var article = document.createElement("article");
                article.className = "card";
                article.innerHTML =
                    '<div class="card-header">' +
                        '<div class="icon ' + escapeHtml((ICON_MAP[slug] || DEFAULT_ICON).cls) + '">!</div>' +
                        '<div class="title-group">' +
                            '<h3 class="title">' + escapeHtml(toDisplayTitle(slug)) + '</h3>' +
                            '<p class="version">Unavailable</p>' +
                            (sourceServer ? '<p class="server-url" title="' + escapeHtml(sourceServer) + '">' + escapeHtml(sourceServer) + '</p>' : '') +
                        '</div>' +
                    '</div>' +
                    '<div class="divider"></div>' +
                    '<p class="description">Could not load agent details: ' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>';
                return article;
            }

            var container = document.getElementById("agent-cards");
            var statusEl = document.getElementById("agent-cards-status");
            var cardViewBtn = document.getElementById("card-view-btn");
            var listViewBtn = document.getElementById("list-view-btn");
            var pageSizeSelect = document.getElementById("page-size-select");
            var prevPageBtn = document.getElementById("prev-page-btn");
            var nextPageBtn = document.getElementById("next-page-btn");
            var pageStatus = document.getElementById("page-status");
            var currentPage = 1;

            try {
                pageSizeSelect.value = window.localStorage.getItem("gasRegistryPageSize") || "10";
            } catch (err) {
                pageSizeSelect.value = "10";
            }

            function matchingCards() {
                return Array.prototype.slice.call(container.querySelectorAll(".card"))
                    .filter(function(card) { return card.getAttribute("data-filter-match") !== "false"; });
            }

            function updatePagination() {
                var allCards = Array.prototype.slice.call(container.querySelectorAll(".card"));
                var cards = matchingCards();
                var pageSize = parseInt(pageSizeSelect.value, 10) || 10;
                var totalPages = Math.max(1, Math.ceil(cards.length / pageSize));
                if (currentPage > totalPages) currentPage = totalPages;
                if (currentPage < 1) currentPage = 1;
                var start = (currentPage - 1) * pageSize;
                var end = start + pageSize;
                var visibleOnPage = 0;

                allCards.forEach(function(card) {
                    card.style.display = "none";
                });
                cards.forEach(function(card, index) {
                    var show = index >= start && index < end;
                    card.style.display = show ? "" : "none";
                    if (show) visibleOnPage++;
                });

                prevPageBtn.disabled = currentPage <= 1;
                nextPageBtn.disabled = currentPage >= totalPages;
                pageStatus.textContent = cards.length
                    ? ("Page " + currentPage + " of " + totalPages + " · " + cards.length + " agent" + (cards.length === 1 ? "" : "s"))
                    : "No matching agents";
                updateEmptyState(cards.length, !!(searchInput && searchInput.value && searchInput.value.trim()));
                return visibleOnPage;
            }

            function resetPagination() {
                currentPage = 1;
                updatePagination();
            }

            pageSizeSelect.addEventListener("change", function() {
                try {
                    window.localStorage.setItem("gasRegistryPageSize", pageSizeSelect.value);
                } catch (err) {
                    // Optional persistence only.
                }
                resetPagination();
            });
            prevPageBtn.addEventListener("click", function() {
                currentPage -= 1;
                updatePagination();
            });
            nextPageBtn.addEventListener("click", function() {
                currentPage += 1;
                updatePagination();
            });

            function setDisplayMode(mode) {
                var isList = mode === "list";
                container.classList.toggle("list-view", isList);
                cardViewBtn.classList.toggle("active", !isList);
                listViewBtn.classList.toggle("active", isList);
                cardViewBtn.setAttribute("aria-pressed", String(!isList));
                listViewBtn.setAttribute("aria-pressed", String(isList));
                try {
                    window.localStorage.setItem("gasRegistryViewMode", isList ? "list" : "card");
                } catch (err) {
                    // Local storage is optional; the view switch still works.
                }
            }

            cardViewBtn.addEventListener("click", function() { setDisplayMode("card"); });
            listViewBtn.addEventListener("click", function() { setDisplayMode("list"); });
            try {
                setDisplayMode(window.localStorage.getItem("gasRegistryViewMode") || "card");
            } catch (err) {
                setDisplayMode("card");
            }

            function setStatus(msg) {
                if (!statusEl.isConnected) {
                    container.insertBefore(statusEl, container.firstChild);
                }
                statusEl.textContent = msg;
            }
            function clearStatus() {
                if (statusEl.isConnected) statusEl.remove();
            }

            // Build a lowercased haystack of searchable fields for one card.
            function buildSearchText(entry, detail) {
                var parts = [];
                var slug = (detail && detail.profile && detail.profile.name) || (entry && entry.name) || "";
                if (slug) {
                    parts.push(slug);                                    // vector_analysis_agent
                    parts.push(slug.replace(/_/g, " "));                 // vector analysis agent
                    parts.push(toDisplayTitle(slug));                    // VectorAnalysisAgent (matches what's shown)
                }
                if (detail && detail.profile) {
                    parts.push(detail.profile.description || "");
                    parts.push(detail.profile.agent_type || "");
                }
                if (detail && detail.skills) {
                    detail.skills.forEach(function(s) {
                        parts.push(s.name || "");
                        parts.push(s.description || "");
                        (s.tags || []).forEach(function(t) { parts.push(t); });
                        (s.supported_operations || []).forEach(function(op) { parts.push(op); });
                    });
                }
                return parts.join(" ").toLowerCase();
            }

            // Track slugs already in the grid to avoid duplicates across registrations.
            var renderedSlugs = Object.create(null);

            function appendAgentsFromCapabilities(caps) {
                var agents = (caps && caps.agents) || [];
                var fresh = agents.filter(function(a) {
                    var slug = a && a.name;
                    if (!slug || renderedSlugs[slug]) return false;
                    return true;
                });
                if (!fresh.length) {
                    return Promise.resolve({ added: 0, total: agents.length, duplicates: agents.length });
                }
                return Promise.all(fresh.map(function(a) {
                    return fetchJson(apiUrl(a.detailUrl || a.describeUrl))
                        .then(function(detail) { return { entry: a, detail: detail, err: null }; })
                        .catch(function(err) { return { entry: a, detail: null, err: err }; });
                })).then(function(results) {
                    clearStatus();
                    results.forEach(function(r) {
                        var card = r.err ? renderErrorCard(r.entry, r.err) : renderCard(r.entry, r.detail);
                        card.setAttribute("data-search", buildSearchText(r.entry, r.detail));
                        card.setAttribute("data-slug", (r.entry && r.entry.name) || "");
                        card.setAttribute("data-filter-match", "true");
                        container.appendChild(card);
                        if (r.entry && r.entry.name) renderedSlugs[r.entry.name] = true;
                    });
                    runSearch();
                    return { added: results.length, total: agents.length, duplicates: agents.length - fresh.length };
                });
            }

            function registerServer(url) {
                return fetchJson(url).then(appendAgentsFromCapabilities);
            }

            // POST a remote GetCapabilities URL to our server, which fetches
            // every agent it publishes and writes them into gas_registry.db.
            // (The remote fetch is server-side, so no browser CORS limits.)
            function registerToDatabase(capabilitiesUrl) {
                return fetch(apiUrl("/registry/api/gas/register"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: capabilitiesUrl })
                }).then(function(r) {
                    return r.json().then(function(body) {
                        if (!r.ok || !body || body.ok === false) {
                            throw new Error(body && body.error ? body.error : ("HTTP " + r.status));
                        }
                        return body; // { ok, registered: [...], count }
                    });
                });
            }

            // ---- Initial load from the default GAS server ----
            registerServer(CAPABILITIES_URL).catch(function(err) {
                setStatus("Failed to load agent registry: " + (err && err.message ? err.message : String(err)));
            });

            // ---- Search filter ----
            var searchInput = document.getElementById("search-input");
            var emptyStateEl = null;

            function updateEmptyState(visible, hasQuery) {
                if (hasQuery && visible === 0 && container.querySelectorAll(".card").length > 0) {
                    if (!emptyStateEl) {
                        emptyStateEl = document.createElement("p");
                        emptyStateEl.className = "empty-state";
                        container.appendChild(emptyStateEl);
                    }
                    emptyStateEl.textContent = "No agents match “" + searchInput.value + "”.";
                } else if (emptyStateEl) {
                    emptyStateEl.remove();
                    emptyStateEl = null;
                }
            }

            // Show/hide already-rendered cards by a set of matching slugs.
            // names === null means "no query" -> show everything.
            function applyNameFilter(names, hasQuery) {
                var set = null;
                if (names) {
                    set = Object.create(null);
                    names.forEach(function(n) { set[n] = true; });
                }
                var cards = container.querySelectorAll(".card");
                cards.forEach(function(card) {
                    var slug = card.getAttribute("data-slug") || "";
                    var match = !set || !!set[slug];
                    card.setAttribute("data-filter-match", match ? "true" : "false");
                });
                resetPagination();
            }

            // Offline/fallback: the original client-side substring filter.
            function applySearchFilter() {
                var q = (searchInput.value || "").trim().toLowerCase();
                var cards = container.querySelectorAll(".card");
                cards.forEach(function(card) {
                    var hay = card.getAttribute("data-search") || "";
                    var match = !q || hay.indexOf(q) !== -1;
                    card.setAttribute("data-filter-match", match ? "true" : "false");
                });
                resetPagination();
            }

            // "Search by" field scope + boolean filter checkboxes (in the
            // dropdown panel).
            var fieldToggle = document.getElementById("field-toggle");
            var fieldPanel = document.getElementById("field-panel");
            var fieldOpts = Array.prototype.slice.call(
                document.querySelectorAll("#field-panel .field-opt"));
            // Filter dropdown temporarily disabled in the HTML; these are
            // stubbed so the rest of the search code keeps working unchanged.
            var filterInputs = [];
            // var filterToggle = document.getElementById("filter-toggle");
            // var filterPanel = document.getElementById("filter-panel");
            // var filterBadge = document.getElementById("filter-badge");
            // var filterClear = document.getElementById("filter-clear");

            // Current "search by" scope ("" = all fields).
            var currentField = "";
            function setSearchField(value, label) {
                currentField = value || "";
                searchInput.setAttribute(
                    "placeholder",
                    currentField ? ("Search by " + label + "…") : "Search agents…");
                fieldOpts.forEach(function(opt) {
                    opt.classList.toggle(
                        "active", (opt.getAttribute("data-field") || "") === currentField);
                });
            }

            function activeFilterParams() {
                // Filter dropdown temporarily disabled -- no boolean filters.
                return [];
            }

            // Server-side query: real SQL (LIKE + json_each) on gas_registry.db.
            var searchSeq = 0;
            function runSearch() {
                var q = (searchInput.value || "").trim();
                var params = activeFilterParams();
                if (q) {
                    params.unshift("q=" + encodeURIComponent(q));
                    if (currentField) params.push("field=" + encodeURIComponent(currentField));
                }

                // Nothing to query -> show everything.
                if (params.length === 0) { applyNameFilter(null, false); return; }

                var seq = ++searchSeq;
                fetch(apiUrl("/registry/api/gas/search?" + params.join("&")), { cache: "no-store" })
                    .then(function(r) { return r.json(); })
                    .then(function(body) {
                        if (seq !== searchSeq) return; // a newer keystroke won
                        if (!body || body.ok === false) {
                            throw new Error(body && body.error ? body.error : "search failed");
                        }
                        var names = (body.agents || []).map(function(a) { return a.name; });
                        applyNameFilter(names, true);
                    })
                    .catch(function() {
                        if (seq !== searchSeq) return;
                        applySearchFilter(); // fall back to client-side
                    });
            }

            var searchTimer = null;
            searchInput.addEventListener("input", function() {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(runSearch, 250);
            });
            // Filter checkboxes are commented out -- nothing to wire.

            // ---- Dropdown open/close (shared by both menus) ----
            function setMenuOpen(panel, toggle, open) {
                panel.hidden = !open;
                toggle.setAttribute("aria-expanded", open ? "true" : "false");
            }
            function closeAllMenus() {
                setMenuOpen(fieldPanel, fieldToggle, false);
            }
            function wireMenu(panel, toggle) {
                toggle.addEventListener("click", function(e) {
                    e.stopPropagation();
                    var willOpen = panel.hidden;
                    closeAllMenus();                 // only one open at a time
                    setMenuOpen(panel, toggle, willOpen);
                });
            }
            wireMenu(fieldPanel, fieldToggle);

            document.addEventListener("click", function(e) {
                if (!fieldPanel.contains(e.target) && !fieldToggle.contains(e.target)) {
                    closeAllMenus();
                }
            });
            document.addEventListener("keydown", function(e) {
                if (e.key === "Escape") closeAllMenus();
            });

            // Pick a "search by" scope -> updates placeholder + re-runs search.
            fieldOpts.forEach(function(opt) {
                opt.addEventListener("click", function() {
                    setSearchField(opt.getAttribute("data-field") || "",
                                   opt.getAttribute("data-label") || "");
                    closeAllMenus();
                    runSearch();
                });
            });

            // filterClear.addEventListener("click", function() {
            //     filterInputs.forEach(function(cb) { cb.checked = false; });
            //     runSearch();
            // });

            // ---- Register modal ----
            var registerBtn = document.getElementById("register-btn");
            registerBtn.addEventListener("click", openRegisterModal);

            function openRegisterModal() {
                var defaultUrl = "https://www.geospatial-agentic-services.online";
                modalContent.innerHTML =
                    '<button class="modal-close" type="button" aria-label="Close">×</button>' +
                    '<h2 class="modal-title">Register GAS Server</h2>' +
                    '<p class="modal-meta">Enter the base URL of a GAS server. Click <strong>Register</strong> to register all agents from that server into this registry. If this server has been registered before, the latest GetCapabilities and DescribeAgent information will update the existing agent records. To register only selected agents, click <strong>List Agents</strong>, choose the agents you want, and then register the selected items.</p>' +
                    '<form id="register-form" novalidate>' +
                        '<div class="form-row">' +
                            '<label class="form-label" for="register-url-input">GAS Server URL</label>' +
                            '<input id="register-url-input" class="form-input" type="url" required ' +
                                'placeholder="https://example.com" ' +
                                'value="' + escapeHtml(defaultUrl) + '">' +
                            <!-- '<p class="form-hint">The server must allow cross-origin requests (CORS) or be on the same origin as this page.</p>' + -->
                        '</div>' +
                        '<div id="register-status" class="form-status"></div>' +
                        '<div id="register-agent-list"></div>' +
                        '<div class="form-actions">' +
                            '<button type="button" id="register-cancel" class="secondary-btn">Cancel</button>' +
                            '<button type="button" id="register-list" class="secondary-btn">List Agents</button>' +
                            '<button type="submit" id="register-submit" class="primary-btn">Register</button>' +
                        '</div>' +
                    '</form>';

                modalContent.querySelector(".modal-close").addEventListener("click", closeModal);
                modalContent.querySelector("#register-cancel").addEventListener("click", closeModal);
                modalContent.querySelector("#register-form").addEventListener("submit", handleRegisterSubmit);
                modalContent.querySelector("#register-list").addEventListener("click", handleListAgents);
                modalContent.scrollTop = 0;
                modalOverlay.classList.add("open");
                document.body.style.overflow = "hidden";
                setTimeout(function() {
                    var input = document.getElementById("register-url-input");
                    if (input) { input.focus(); input.select(); }
                }, 50);
            }

            function listRemoteAgents(capabilitiesUrl) {
                return fetch(apiUrl("/registry/api/gas/list-remote"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: capabilitiesUrl })
                }).then(function(r) {
                    return r.json().then(function(body) {
                        if (!r.ok || !body || body.ok === false) {
                            throw new Error(body && body.error ? body.error : ("HTTP " + r.status));
                        }
                        return body; // { ok, agents: [...] }
                    });
                });
            }

            function registerSelected(capabilitiesUrl, names) {
                return fetch(apiUrl("/registry/api/gas/register-selected"), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: capabilitiesUrl, names: names })
                }).then(function(r) {
                    return r.json().then(function(body) {
                        if (!r.ok || !body || body.ok === false) {
                            throw new Error(body && body.error ? body.error : ("HTTP " + r.status));
                        }
                        return body;
                    });
                });
            }

            function renderRemoteAgentList(agents) {
                var box = document.getElementById("register-agent-list");
                if (!agents.length) {
                    box.innerHTML = '<p class="form-hint" style="margin-top:14px;">No agents found at that URL.</p>';
                    return;
                }
                var rows = agents.map(function(a) {
                    var slug = a.name || "";
                    var displayName = a.displayName && a.displayName !== slug ? a.displayName : toDisplayTitle(slug);
                    var version = a.version ? '<span class="agent-version">v' + escapeHtml(a.version) + '</span>' : '';
                    var desc = a.description ? escapeHtml(a.description) : '<em>No description provided.</em>';
                    return '<label class="remote-agent-item">' +
                        '<input type="checkbox" class="remote-agent-cb" value="' + escapeHtml(slug) + '" checked>' +
                        '<span class="info">' +
                            '<span class="title-row">' +
                                '<span class="agent-name">' + escapeHtml(displayName) + '</span>' +
                                version +
                            '</span>' +
                            '<p class="agent-desc">' + desc + '</p>' +
                        '</span>' +
                    '</label>';
                }).join("");
                box.innerHTML =
                    '<div class="remote-agent-list">' +
                        '<div class="remote-agent-list-header">' +
                            '<label class="select-all">' +
                                '<input type="checkbox" id="remote-agent-select-all" checked> ' +
                                'Select all (' + agents.length + ')' +
                            '</label>' +
                            '<span id="remote-agent-count">' + agents.length + ' selected</span>' +
                        '</div>' +
                        '<div class="remote-agent-grid">' + rows + '</div>' +
                    '</div>';

                var selectAll = box.querySelector("#remote-agent-select-all");
                var cbs = box.querySelectorAll(".remote-agent-cb");
                var countEl = box.querySelector("#remote-agent-count");
                function updateCount() {
                    var n = 0;
                    cbs.forEach(function(cb) { if (cb.checked) n++; });
                    countEl.textContent = n + " selected";
                    selectAll.checked = (n === cbs.length);
                    selectAll.indeterminate = (n > 0 && n < cbs.length);
                }
                selectAll.addEventListener("change", function() {
                    cbs.forEach(function(cb) { cb.checked = selectAll.checked; });
                    updateCount();
                });
                cbs.forEach(function(cb) { cb.addEventListener("change", updateCount); });
            }

            function getSelectedRemoteNames() {
                var box = document.getElementById("register-agent-list");
                if (!box) return null;
                var cbs = box.querySelectorAll(".remote-agent-cb");
                if (!cbs.length) return null;
                var names = [];
                cbs.forEach(function(cb) { if (cb.checked) names.push(cb.value); });
                return names;
            }

            function handleListAgents() {
                var input = document.getElementById("register-url-input");
                var statusBox = document.getElementById("register-status");
                var listBtn = document.getElementById("register-list");
                var url = (input.value || "").trim();
                if (!url) {
                    statusBox.className = "form-status error";
                    statusBox.textContent = "Please enter a URL.";
                    return;
                }
                statusBox.className = "form-status info";
                statusBox.textContent = "Fetching agent list from server…";
                listBtn.disabled = true;
                listRemoteAgents(url)
                    .then(function(body) {
                        var agents = (body && body.agents) || [];
                        renderRemoteAgentList(agents);
                        statusBox.className = "form-status success";
                        statusBox.textContent = "Found " + agents.length + " agent" +
                            (agents.length === 1 ? "" : "s") +
                            (agents.length ? " — review and uncheck any you don't want, then click Register." : ".");
                    })
                    .catch(function(err) {
                        statusBox.className = "form-status error";
                        statusBox.textContent = err && err.message ? err.message : String(err);
                    })
                    .then(function() { listBtn.disabled = false; });
            }

            function handleRegisterSubmit(e) {
                e.preventDefault();
                var input = document.getElementById("register-url-input");
                var statusBox = document.getElementById("register-status");
                var submitBtn = document.getElementById("register-submit");
                var url = (input.value || "").trim();
                if (!url) {
                    statusBox.className = "form-status error";
                    statusBox.textContent = "Please enter a URL.";
                    return;
                }

                var selected = getSelectedRemoteNames();
                if (selected !== null && selected.length === 0) {
                    statusBox.className = "form-status error";
                    statusBox.textContent = "Select at least one agent to register.";
                    return;
                }

                statusBox.className = "form-status info";
                statusBox.textContent = "Fetching capabilities…";
                submitBtn.disabled = true;
                input.disabled = true;

                statusBox.textContent = selected
                    ? "Registering " + selected.length + " selected agent" + (selected.length === 1 ? "" : "s") + "…"
                    : "Registering agents into the database…";

                var registerPromise = selected
                    ? registerSelected(url, selected)
                    : registerToDatabase(url);

                registerPromise
                    .then(function(res) {
                        // Agents are now in the DB; refresh the catalog from
                        // our local DB-backed capabilities to show new cards.
                        return fetchJson(CAPABILITIES_URL)
                            .then(appendAgentsFromCapabilities)
                            .then(function(view) { return { res: res, view: view }; });
                    })
                    .then(function(o) {
                        var registered = (o.res && o.res.count) || 0;
                        var added = (o.view && o.view.added) || 0;
                        statusBox.className = "form-status success";
                        if (registered > 0) {
                            statusBox.textContent = "Registered " + registered + " agent" + (registered === 1 ? "" : "s") +
                                " into the database" +
                                (added > 0 ? " — " + added + " new card" + (added === 1 ? "" : "s") + " added." :
                                             " (already shown in catalog).");
                        } else {
                            statusBox.textContent = "No agents found at that URL.";
                        }
                        // Leave the modal open so the user can read the
                        // result; they dismiss it via Close / Esc / overlay.
                        var cancelBtn = modalContent.querySelector("#register-cancel");
                        if (cancelBtn) cancelBtn.textContent = "Close";
                        submitBtn.style.display = "none";
                        input.disabled = true;
                    })
                    .catch(function(err) {
                        statusBox.className = "form-status error";
                        var msg = err && err.message ? err.message : String(err);
                        statusBox.textContent = msg;
                        submitBtn.disabled = false;
                        input.disabled = false;
                    });
            }
        })();
    </script>
</body>
</html>
